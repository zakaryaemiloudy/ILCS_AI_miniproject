spring.application.name=ILCS-AGENT-AI
server.port=${PORT:8080}

# Groq API Configuration (from .env file)
spring.ai.openai.base-url=${SPRING_AI_OPENAI_BASE_URL:https://api.groq.com/openai}
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY}
spring.ai.openai.chat.options.model=${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:openai/gpt-oss-120b}
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# RAG: Embedding model configuration (from .env file)
spring.ai.openai.embedding.api-key=${SPRING_AI_OPENAI_API_KEY}
spring.ai.openai.embedding.base-url=${SPRING_AI_OPENAI_BASE_URL:https://api.groq.com/openai}
spring.ai.openai.embedding.options.model=${SPRING_AI_OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

# RAG: Vector store file location (for persistence)
vector.store.file.path=./data/vectorstore.json

# Database Configuration (from .env file)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:ilcs_db}
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create}
spring.h2.console.enabled=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# TTS Configuration (from .env file)
groq.tts.voice=${GROQ_TTS_VOICE:daniel}
# Available voices: autumn, diana, hannah (female) | austin, daniel, troy (male)