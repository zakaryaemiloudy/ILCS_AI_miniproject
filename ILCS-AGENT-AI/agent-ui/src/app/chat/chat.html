<div class="p-3">
  <div class="card-body">
    <label class="form-label">
      Posez votre question :
    </label>
    <input
      [(ngModel)]="question"

      class="form-control w-75 d-inline m-2" type="text">
      <button
      (click)="askAgent()"
      class="btn btn-outline-primary m-2 d-inline">
      Envoyer
    </button>
    @if(progress){
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    }
  </div>

  <div class="card-body m-2">
    @if(reponse){
      <markdown [data]="reponse"></markdown>

      }
  </div>
</div>
