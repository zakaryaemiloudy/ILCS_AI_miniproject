<div class="p-3">
  <div class="card-body">
    <label class="form-label fw-semibold">Posez votre question :</label>

    <!-- Input row -->
    <div class="d-flex align-items-center gap-2 flex-wrap mt-1">
      <input
        [(ngModel)]="question"
        (keyup.enter)="selectedFiles.length ? askWithPdf() : askAgent()"
        class="form-control flex-grow-1"
        type="text"
        placeholder="Écrivez ou parlez...">

      <!-- Mic button -->
      <button
        (click)="toggleVoice()"
        class="btn btn-icon"
        [class.btn-danger]="isListening"
        [class.btn-outline-secondary]="!isListening"
        title="{{ isListening ? 'Arrêter l\'écoute' : 'Parler' }}">
        <i class="bi" [class.bi-mic-fill]="!isListening" [class.bi-stop-fill]="isListening"></i>
      </button>

      <!-- PDF upload button -->
      <button
        (click)="fileInput.click()"
        class="btn btn-outline-secondary btn-icon"
        title="Joindre un PDF">
        <i class="bi bi-file-earmark-pdf"></i>
      </button>
      <input #fileInput type="file" accept=".pdf" multiple class="d-none" (change)="onFileSelected($event)">

      <!-- Send button -->
      <button
        (click)="selectedFiles.length ? askWithPdf() : askAgent()"
        [disabled]="progress"
        class="btn btn-primary">
        Envoyer
      </button>
    </div>

    <!-- Selected PDF badges -->
    @if(selectedFiles.length) {
      <div class="mt-2 d-flex flex-wrap gap-2 align-items-center">
        @for(file of selectedFiles; track file.name; let i = $index) {
          <span class="badge bg-danger-subtle text-danger-emphasis border border-danger-subtle px-2 py-1">
            <i class="bi bi-file-earmark-pdf me-1"></i>{{ file.name }}
            <button class="btn btn-link p-0 ms-1 text-danger" style="font-size:0.75rem;line-height:1" (click)="removeFile(i)" title="Retirer">
              <i class="bi bi-x"></i>
            </button>
          </span>
        }
      </div>
    }

    <!-- Auto-speak toggle -->
    <div class="mt-2 form-check form-switch">
      <input class="form-check-input" type="checkbox" id="autoSpeakToggle" [(ngModel)]="autoSpeak">
      <label class="form-check-label text-muted small" for="autoSpeakToggle">
        <i class="bi bi-volume-up me-1"></i>Lire la réponse automatiquement
      </label>
    </div>

    <!-- Listening indicator -->
    @if(isListening) {
      <div class="mt-2 d-flex align-items-center gap-2 text-danger">
        <span class="listening-dot"></span>
        <span class="small fw-semibold">Écoute en cours...</span>
      </div>
    }

    <!-- Loading spinner -->
    @if(progress) {
      <div class="mt-2 d-flex align-items-center gap-2">
        <div class="spinner-border spinner-border-sm text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <span class="small text-muted">Traitement en cours...</span>
      </div>
    }
  </div>

  <!-- Error message -->
  @if(errorMsg) {
    <div class="alert alert-danger mx-3 mt-2 py-2 small">
      <i class="bi bi-exclamation-triangle me-1"></i>{{ errorMsg }}
    </div>
  }

  <!-- Response area -->
  <div class="card-body m-2">
    @if(response) {
      <div class="d-flex align-items-center gap-2 mb-2">
        <span class="text-muted small fw-semibold">Réponse :</span>
        @if(!isSpeaking) {
          <button class="btn btn-sm btn-outline-secondary" (click)="speakResponse()" title="Lire la réponse">
            <i class="bi bi-volume-up"></i>
          </button>
        } @else {
          <button class="btn btn-sm btn-outline-danger" (click)="stopSpeaking()" title="Arrêter">
            <i class="bi bi-stop-fill"></i>
          </button>
        }
      </div>
      <markdown [data]="response"></markdown>
    }
  </div>
</div>
